plugins {
    id 'com.android.application' version '8.1.0'
}

android {
    namespace 'com.cymux'
    compileSdk 34

    defaultConfig {
        applicationId "com.cymux"
        minSdk 29
        targetSdk 34
        versionCode 1
        versionName "2.0.0"

        ndk {
            abiFilters "arm64-v8a"
        }
    }

    externalNativeBuild {
        ndkBuild {
            path "jni/Android.mk"
        }
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
}
